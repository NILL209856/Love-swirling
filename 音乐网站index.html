<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤ 留声机 ❤</title>
    <style>
           body{
            background-image: url('图片/微信图片_20260506233115_82_2.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  /* 修正 */
            min-height: 100vh;
            display: flex;           /* 修正拼写 */
            justify-content: center;
            align-items: center;  

        }
        .content {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 50px;
        }
         /* 半透明遮罩层，让内容更易读 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        /* 播放器容器 */
        .music-player {
            position: relative;
            z-index: 1;
            width: 380px;
            max-width: 90%;
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(1px);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }

        /* 专辑封面 */
        .cover {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 歌曲信息 */
        .song-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .song-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* 进度条区域 */
        .progress-area {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 5px;
            position: relative;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .play-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }

        .play-btn:hover {
            transform: scale(1.08);
        }

        /* 音量控制 */
        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .volume-icon {
            cursor: pointer;
            font-size: 1rem;
            opacity: 0.7;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
        }

        /* 播放列表 */
        .playlist {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .playlist-title {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 10px;
            text-align: center;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 12px;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .playlist-item.active {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
        }

        .playlist-index {
            font-size: 0.8rem;
            opacity: 0.6;
            width: 25px;
        }

        .playlist-info {
            flex: 1;
        }

        .playlist-song {
            font-size: 0.85rem;
        }

        .playlist-artist {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .playing-indicator {
            font-size: 0.7rem;
            color: #764ba2;
        }

        /* 滚动条美化 */
        .playlist::-webkit-scrollbar {
            width: 4px;
        }

        .playlist::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="music-player">
        <!-- 专辑封面 -->
        <div class="cover">
            <img id="coverImg" src="图片/微信图片_20260507094516_83_2.jpg" alt="专辑封面">
        </div>

        <!-- 歌曲信息 -->
        <div class="song-info">
            <div class="song-title" id="songTitle">唯一</div>
            <div class="song-artist" id="songArtist">邓紫棋</div>
        </div>

        <!-- 进度条 -->
        <div class="progress-area">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="duration">00:00</span>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="control-btn" id="prevBtn">⏮</button>
            <button class="control-btn play-btn" id="playBtn">▶</button>
            <button class="control-btn" id="nextBtn">⏭</button>
        </div>

        <!-- 音量控制 -->
        <div class="volume-area">
            <span class="volume-icon" id="volumeIcon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>

        <!-- 播放列表 -->
        <div class="playlist">
            <div class="playlist-title">📋 播放列表</div>
            <div id="playlistContainer"></div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // ========== 歌曲数据（你需要替换成自己的音乐文件）==========
        // 提示：你需要把音乐文件放在服务器或本地同目录下
        // 或者使用网络可访问的音频URL
        
        const playlist = [
            {
                title: "唯一",
                artist: "邓紫棋",
                cover: "图片/微信图片_20260507094516_83_2.jpg",
                src: "音频/20260507_103929.m4a"  // 示例音乐（公开音频）
            },
            {
                title: "多幸运",
                artist: "韩安旭",
                cover: "图片/微信图片_20260508163209_87_2.jpg",
                src: "音频/20260507_192837.m4a"
            },
            {
                title: "至少还有你",
                artist: "林忆莲",
                cover: "图片/1def394ba5475d44337d96d5614ac9b9.jpg",
                src: "音频/20260519_201910.m4a"
            },
            {
                title: "光年之外",
                artist: "邓紫棋",
                cover: "图片/微信图片_20260508163316_91_2.jpg",
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
            }
        ];

        // DOM 元素
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIcon = document.getElementById('volumeIcon');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const coverImg = document.getElementById('coverImg');
        const playlistContainer = document.getElementById('playlistContainer');

        // 变量
        let currentIndex = 0;
        let isPlaying = false;

        // ========== 辅助函数 ==========
        function formatTime(seconds) {
            if (isNaN(seconds)) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 加载歌曲
        function loadSong(index) {
            const song = playlist[index];
            if (!song) return;
            
            audio.src = song.src;
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            coverImg.src = song.cover;
            
            // 更新播放列表高亮
            updatePlaylistActive();
            
            // 重置进度条
            progressFill.style.width = '0%';
            currentTimeSpan.textContent = '00:00';
            
            // 如果之前是播放状态，加载后继续播放
            if (isPlaying) {
                audio.play().catch(e => console.log('播放需要用户交互'));
            }
        }

        // 播放
        function play() {
            audio.play();
            isPlaying = true;
            playBtn.textContent = '⏸';
        }

        // 暂停
        function pause() {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
        }

        // 切换播放/暂停
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        // 上一首
        function prevSong() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('播放需要用户交互'));
            }
        }

        // 下一首
        function nextSong() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log('播放需要用户交互'));
            }
        }

        // 更新进度条
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = `${percent}%`;
                currentTimeSpan.textContent = formatTime(audio.currentTime);
                durationSpan.textContent = formatTime(audio.duration);
            }
        }

        // 设置进度（点击进度条跳转）
        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percent = clickX / width;
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }

        // 设置音量
        function setVolume() {
            const value = volumeSlider.value;
            audio.volume = value / 100;
            updateVolumeIcon(value);
        }

        function updateVolumeIcon(value) {
            if (value == 0) {
                volumeIcon.textContent = '🔇';
            } else if (value < 50) {
                volumeIcon.textContent = '🔉';
            } else {
                volumeIcon.textContent = '🔊';
            }
        }

        // 静音切换
        function toggleMute() {
            if (audio.volume > 0) {
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeIcon.textContent = '🔇';
            } else {
                audio.volume = 0.7;
                volumeSlider.value = 70;
                volumeIcon.textContent = '🔊';
            }
        }

        // 渲染播放列表
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-index">${(index + 1).toString().padStart(2, '0')}</div>
                    <div class="playlist-info">
                        <div class="playlist-song">${song.title}</div>
                        <div class="playlist-artist">${song.artist}</div>
                    </div>
                    <div class="playing-indicator">${index === currentIndex && isPlaying ? '🎵' : ''}</div>
                `;
                item.addEventListener('click', () => {
                    currentIndex = index;
                    loadSong(currentIndex);
                    if (isPlaying) {
                        audio.play().catch(e => console.log('播放需要用户交互'));
                    } else {
                        play(); // 点击播放列表时自动播放
                    }
                });
                playlistContainer.appendChild(item);
            });
        }

        function updatePlaylistActive() {
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((item, idx) => {
                if (idx === currentIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
                // 更新播放指示器
                const indicator = item.querySelector('.playing-indicator');
                if (indicator) {
                    indicator.textContent = (idx === currentIndex && isPlaying) ? '🎵' : '';
                }
            });
        }

        // 自动播放下一首
        function handleSongEnd() {
            nextSong();
        }

        // ========== 事件绑定 ==========
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        progressBar.addEventListener('click', setProgress);
        volumeSlider.addEventListener('input', setVolume);
        volumeIcon.addEventListener('click', toggleMute);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', handleSongEnd);
        audio.addEventListener('loadedmetadata', () => {
            durationSpan.textContent = formatTime(audio.duration);
        });

        // 页面可见性变化时保活（可选）
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) {
                // 页面不可见时可以选择暂停或继续，这里不做处理
            }
        });

        // 初始化
        function init() {
            renderPlaylist();
            loadSong(0);
            // 设置默认音量
            audio.volume = 0.7;
            volumeSlider.value = 70;
            // 注意：由于浏览器策略，用户必须与页面交互后才能播放
            // 首次播放需要用户点击播放按钮
        }

        init();
        </script>
</body>
</html>
